<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Excalidraw to ASCII</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              mono: ['ui-monospace', 'SFMono-Regular', 'monospace'],
            },
          },
        },
      };
    </script>
    <script type="module" crossorigin src="./assets/index-Cq2LGeDJ.js"></script>
  </head>
  <body class="min-h-screen overflow-hidden bg-slate-950 text-slate-100 transition-colors dark:bg-slate-950 dark:text-slate-100 bg-white text-slate-900">
    <div class="flex h-screen w-full flex-col gap-4 p-4">
      <header class="flex shrink-0 items-start justify-between gap-4">
        <div class="flex flex-col gap-1">
          <h1 class="text-lg font-semibold">Excalidraw to ASCII</h1>
          <p class="text-sm text-slate-400 dark:text-slate-400 text-slate-600">
          Paste Excalidraw scene JSON, export it through Excalidraw's canvas API, and convert it to ASCII.
          </p>
        </div>
        <button
          id="theme"
          class="shrink-0 rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-200 hover:border-slate-500 hover:bg-slate-900 dark:border-slate-700 dark:text-slate-200 dark:hover:bg-slate-900 bg-white text-slate-700 hover:border-slate-300 hover:bg-slate-100"
          type="button"
        >
          Theme
        </button>
      </header>

      <main class="grid flex-1 min-h-0 gap-4 lg:grid-cols-[minmax(0,1fr)_minmax(0,2fr)]">
        <section class="flex min-h-0 flex-col rounded-2xl border border-slate-800 bg-slate-900/70 p-4 shadow-lg shadow-black/20 dark:border-slate-800 dark:bg-slate-900/70 bg-white shadow-slate-200/40">
          <div class="mb-3 flex items-center justify-between gap-3">
            <h2 class="text-sm font-medium text-slate-200 dark:text-slate-200 text-slate-800">Scene JSON</h2>
            <button
              id="convert"
              class="rounded-lg bg-cyan-500 px-3 py-1.5 text-sm font-medium text-slate-950 hover:bg-cyan-400"
              type="button"
            >
              Export ASCII
            </button>
          </div>

          <textarea
            id="scene"
            class="w-full flex-1 min-h-0 rounded-xl border border-slate-800 bg-slate-950 p-3 font-mono text-xs leading-5 text-slate-100 outline-none placeholder:text-slate-600 focus:border-cyan-500 dark:border-slate-800 dark:bg-slate-950 dark:text-slate-100 bg-white text-slate-900"
            spellcheck="false"
            placeholder="Paste Excalidraw scene JSON here"
          ></textarea>

          <div class="mt-3 flex flex-wrap items-center gap-4">
            <label class="flex items-center gap-2 text-sm text-slate-300">
              Width
              <input
                id="columns"
                type="number"
                min="20"
                max="240"
                value="120"
                class="w-20 rounded-lg border border-slate-800 bg-slate-950 px-2 py-1 font-mono text-sm outline-none focus:border-cyan-500 dark:border-slate-800 dark:bg-slate-950 dark:text-slate-100 bg-white text-slate-900"
              />
            </label>
            <label class="flex items-center gap-2 text-sm text-slate-300 cursor-pointer">
              <input
                id="ietf"
                type="checkbox"
                class="h-4 w-4 rounded border-slate-800 bg-slate-950 text-cyan-500 focus:ring-cyan-500"
              />
              IETF Mode (72 chars)
            </label>
            <button
              id="clear"
              class="rounded-lg border border-slate-800 px-3 py-1.5 text-sm text-slate-300 hover:border-slate-600 hover:text-white dark:border-slate-800 dark:text-slate-300 dark:hover:border-slate-600 dark:hover:text-white bg-white text-slate-700 hover:border-slate-300 hover:bg-slate-100"
              type="button"
            >
              Clear
            </button>
          </div>
        </section>

        <section class="flex min-h-0 flex-col rounded-2xl border border-slate-800 bg-slate-900/70 p-4 shadow-lg shadow-black/20 dark:border-slate-800 dark:bg-slate-900/70 bg-white shadow-slate-200/40">
          <div class="mb-3 flex items-center justify-between gap-3">
            <h2 class="text-sm font-medium text-slate-200 dark:text-slate-200 text-slate-800">ASCII</h2>
            <button
              id="copy"
              class="rounded-lg border border-slate-800 px-3 py-1.5 text-sm text-slate-300 hover:border-slate-600 hover:text-white dark:border-slate-800 dark:text-slate-300 dark:hover:border-slate-600 dark:hover:text-white bg-white text-slate-700 hover:border-slate-300 hover:bg-slate-100"
              type="button"
            >
              Copy
            </button>
          </div>

          <textarea
            id="ascii"
            readonly
            class="w-full flex-1 min-h-0 rounded-xl border border-slate-800 bg-slate-950 p-3 font-mono text-xs leading-5 text-lime-200 outline-none dark:border-slate-800 dark:bg-slate-950 dark:text-lime-200 bg-white text-slate-900"
            spellcheck="false"
          ></textarea>

          <p id="status" class="mt-3 text-sm text-slate-400 dark:text-slate-400 text-slate-600" aria-live="polite">Ready.</p>
        </section>
      </main>
    </div>

  </body>
</html>
